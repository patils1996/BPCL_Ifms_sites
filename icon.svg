<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Icon Background -->
  <rect width="512" height="512" rx="128" fill="#0e1e38" />
  
  <!-- Outer Energy Ring (BPCL Partner themed) -->
  <ellipse cx="256" cy="256" rx="200" ry="220" fill="none" stroke="#0054A6" stroke-width="24" stroke-dasharray="10 15" opacity="0.3" />
  <ellipse cx="256" cy="256" rx="170" ry="190" fill="none" stroke="#F37021" stroke-width="12" />
  
  <!-- Central Logo Core -->
  <g transform="translate(110, 160)">
    <!-- Slanted CLR Lettermark -->
    <text x="0" y="160" font-family="'Outfit', sans-serif" font-weight="900" font-style="italic" font-size="160" fill="#c4c13a">C</text>
    <text x="110" y="160" font-family="'Outfit', sans-serif" font-weight="900" font-style="italic" font-size="160" fill="#75b967">L</text>
    <text x="190" y="160" font-family="'Outfit', sans-serif" font-weight="900" font-style="italic" font-size="160" fill="#5f85bc">r</text>
  </g>
  
  <!-- Subtitle Tagline -->
  <text x="256" y="440" font-family="'Plus Jakarta Sans', sans-serif" font-weight="600" font-size="28" fill="#94a3b8" text-anchor="middle" letter-spacing="4">PORTAL</text>
</svg>
